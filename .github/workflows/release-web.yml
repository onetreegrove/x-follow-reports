name: Release web build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-web:
    name: Build and publish web release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm build

      - name: Package deployable web service
        run: |
          mkdir -p release-assets
          mkdir -p release-package/web
          cp README.md release-package/
          cp web/package.json release-package/web/package.json
          cp -R web/server-dist release-package/web/server-dist
          cp -R web/dist release-package/web/dist
          cat > release-package/DEPLOY.md <<'EOF'
          # Deploy x-follow-report web service

          ## Requirements

          - Node.js 22 or newer

          ## Start

          ```bash
          export PORT=8787
          export REPORT_ROOT=/data/x-follow-report/report-outputs
          export REPORT_UPLOAD_TOKEN='replace-with-a-long-random-token'

          cd web
          node server-dist/index.js
          ```

          The service listens on `127.0.0.1:${PORT}` and serves both the web UI and `/api/reports`.
          Put it behind a reverse proxy such as Nginx for public access.
          EOF
          tar -czf release-assets/x-follow-report-web-service.tar.gz -C release-package .
          (cd release-package && zip -r ../release-assets/x-follow-report-web-service.zip .)

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: x-follow-report-web
          path: release-assets/*
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          fail_on_unmatched_files: true
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('web-{0}', github.run_number) }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || format('Web build {0}', github.run_number) }}
          make_latest: ${{ github.ref_type == 'tag' }}
